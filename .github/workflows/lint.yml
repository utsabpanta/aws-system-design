name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@0.18.1
      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#.git" "#images"

  cspell:
    name: cspell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install cspell
        run: npm install -g cspell@8.17.1
      - name: Run cspell
        run: cspell --config .cspell.json --gitignore --no-progress --no-summary "**/*.md"

  lychee:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --no-progress './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  toc:
    name: README TOC in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check README TOC is up to date
        run: python3 scripts/build_toc.py --check
