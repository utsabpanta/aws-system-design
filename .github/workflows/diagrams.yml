name: Diagrams

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  mermaid-validate:
    name: Validate Mermaid blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli@11.4.2
      - name: Install puppeteer deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64
      - name: Extract and validate Mermaid blocks
        run: bash scripts/validate_mermaid.sh $(git ls-files '*.md')

  python-diagrams-render:
    name: Re-render Python diagrams (verify sources render)
    runs-on: ubuntu-latest
    # Skip unless someone touched a Python diagram source or an image.
    if: |
      contains(github.event.pull_request.changed_files, 'diagrams/python/') ||
      contains(github.event.pull_request.changed_files, 'images/') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Install Python deps
        run: pip install -r diagrams/python/requirements.txt
      - name: Re-render all diagrams
        # Confirms every diagram source renders without error. We intentionally
        # do NOT byte-compare against committed PNGs: graphviz output is not
        # reproducible across platforms/versions (a macOS contributor and the
        # CI Linux runner produce different bytes from identical source), so a
        # byte diff is noise, not signal. A render failure here means a broken
        # diagram source, which is what we actually want to catch.
        run: bash scripts/render_diagrams.sh
      - name: Confirm an image was produced for every source
        run: |
          missing=0
          while IFS= read -r src; do
            case "$src" in
              diagrams/python/_shared/*|*/__init__.py) continue ;;
            esac
            rel="${src#diagrams/python/}"
            out="images/${rel%/*}/$(basename "${rel}" .py).png"
            if [[ ! -s "$out" ]]; then
              echo "::error::No rendered image for $src (expected $out)"
              missing=1
            fi
          done < <(find diagrams/python -type f -name '*.py' | sort)
          exit "$missing"
